<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passkey Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
      color: #f0f0f5;
      min-height: 100vh;
      padding: 20px;
    }
    
    #root {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .container {
      max-width: 1400px;
      width: 100%;
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .header-account {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #888;
      background: rgba(255,255,255,0.03);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    
    /* Account card */
    .account-card {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15) 0%, rgba(0, 212, 255, 0.08) 100%);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    
    .account-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.5), transparent);
    }
    
    .account-address {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.1);
      padding: 10px 16px;
      border-radius: 10px;
      margin-top: 12px;
      cursor: pointer;
      transition: background 0.2s;
      display: inline-block;
    }
    
    .account-address:hover {
      background: rgba(0, 212, 255, 0.15);
    }
    
    .chains {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    
    .chain-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #666;
      transition: all 0.2s;
    }
    
    .chain-badge.active {
      border-color: rgba(0, 212, 255, 0.4);
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.1);
    }
    
    .chain-badge.solana.active {
      border-color: rgba(20, 241, 148, 0.4);
      color: #14f194;
      background: rgba(20, 241, 148, 0.1);
    }
    
    /* Dashboard grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    /* Cards */
    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    
    .card:hover {
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(255,255,255,0.05);
    }
    
    .card-icon.eth { background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(139, 92, 246, 0.2)); }
    .card-icon.sol { background: linear-gradient(135deg, rgba(20, 241, 148, 0.2), rgba(4, 224, 217, 0.2)); }
    .card-icon.send { background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(59, 130, 246, 0.2)); }
    .card-icon.key { background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(245, 158, 11, 0.2)); }
    .card-icon.backup { background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(219, 39, 119, 0.2)); }
    .card-icon.info { background: linear-gradient(135deg, rgba(100, 116, 139, 0.2), rgba(71, 85, 105, 0.2)); }
    
    .card-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    
    .card-subtitle {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }
    
    /* Balance */
    .balance-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .balance {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    
    .balance.eth { color: #8b5cf6; }
    .balance.sol { color: #14f194; }
    
    .balance-usd {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }
    
    .balance-label {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }
    
    /* Address display */
    .address-short {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #888;
      background: rgba(255,255,255,0.03);
      padding: 6px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 12px;
    }
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
    }
    
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }
    
    .btn-danger {
      background: transparent;
      color: #ef4444;
      font-size: 13px;
      padding: 8px 12px;
    }
    
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }
    
    .btn-full {
      width: 100%;
    }
    
    /* Inputs */
    .input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #f0f0f5;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .input:focus {
      border-color: rgba(0, 212, 255, 0.4);
    }
    
    .input::placeholder {
      color: #444;
    }
    
    .input-group {
      margin-bottom: 10px;
    }
    
    /* Row */
    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    
    .row .btn {
      flex: 1;
    }
    
    /* Status indicators */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    .status-success {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }
    
    .status-pending {
      background: rgba(251, 191, 36, 0.1);
      color: #fbbf24;
    }
    
    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    
    /* Session key item */
    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .session-item:last-child {
      border-bottom: none;
    }
    
    .session-info {
      flex: 1;
    }
    
    .session-id {
      font-weight: 500;
      font-size: 13px;
      color: #f0f0f5;
    }
    
    .session-pubkey {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    
    .session-expires {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    
    .session-expires.expired {
      color: #ef4444;
    }
    
    /* Log panel */
    .log-card {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }
    
    .log-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .log {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #555;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    
    .modal {
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      max-width: 440px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    
    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Logout button */
    .logout-btn {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.5);
    }
    
    /* Welcome/Login screens */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }
    
    .welcome-logo {
      font-size: 64px;
      margin-bottom: 24px;
    }
    
    .welcome-title {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .welcome-subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 40px;
      max-width: 400px;
    }
    
    .welcome-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }
    
    .welcome-actions .btn {
      padding: 16px;
    }
    
    /* How it works */
    .how-it-works {
      text-align: left;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    
    .how-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 16px;
    }
    
    .how-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    
    .how-step {
      padding: 16px;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    
    .how-step-number {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
      color: #00d4ff;
      margin-bottom: 12px;
    }
    
    .how-step-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .how-step-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }
    
    /* Test bench */
    .test-bench {
      text-align: left;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    
    .test-bench-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #555;
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .container {
        max-width: 420px;
      }
      
      .header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      
      .balance {
        font-size: 28px;
      }
      
      .welcome-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
