<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passkey Wallet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 40px 0 8px;
      background: linear-gradient(135deg, #00c2ff, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 40px;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .address {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      color: #00c2ff;
      word-break: break-all;
      cursor: pointer;
    }
    .address:hover { opacity: 0.8; }
    .balance {
      font-size: 36px;
      font-weight: 700;
      margin: 8px 0 4px;
    }
    .balance-label {
      font-size: 14px;
      color: #666;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00c2ff, #7b61ff);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #1a1a1a;
      color: #e5e5e5;
      border: 1px solid #333;
    }
    .btn-secondary:hover { background: #222; }
    .btn-danger {
      background: transparent;
      color: #666;
      font-size: 14px;
      padding: 8px;
    }
    .input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }
    .input:focus { border-color: #00c2ff; }
    .input::placeholder { color: #444; }
    .row { display: flex; gap: 12px; margin-top: 12px; }
    .row .btn { flex: 1; }
    .log {
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      color: #555;
      max-height: 200px;
      overflow-y: auto;
      padding: 8px;
      background: #0a0a0a;
      border-radius: 8px;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .chains {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .chain-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
    }
    .chain-badge.active {
      border-color: #00c2ff;
      color: #00c2ff;
    }
    #root { width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
